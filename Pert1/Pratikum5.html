<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Latihan-5</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        .main-container {
            border: 1px solid #ccc;
            padding: 20px;
            max-width: 900px;
        }
        .career-section {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }
        .career-card {
            width: 30%;
            padding: 10px;
        }
        .career-header {
            border: 2px solid #205b8d;
            padding: 10px;
            font-weight: bold;
            margin-bottom: 20px;
            min-height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .lang-list {
            list-style: none;
            padding: 0;
        }
        .lang-item {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            font-weight: bold;
            font-size: 14px;
        }
        .lang-icon {
            width: 35px;
            margin-right: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .lang-icon img {
            width: 50%;
            height: auto;
        }
        iframe {
            width: 100%;
            border: 1px solid black;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <h2>Programming Language Base on Career</h2>

        <div class="career-section">
            <!-- Front-end -->
            <div class="career-card">
                <div class="career-header">Front-end Web Development</div>
                <div class="lang-list">
                    <div class="lang-item"><div class="lang-icon"><img src="JavaScript.png" alt="JS"></div> JavaScript</div>
                    <div class="lang-item"><div class="lang-icon"><img src="Elm.png" alt="Elm"></div> Elm</div>
                    <div class="lang-item"><div class="lang-icon"><img src="TypeScript.png" alt="TS"></div> TypeScript</div>
                </div>
            </div>

            <!-- Back-end -->
            <div class="career-card">
                <div class="career-header">Back-end Web Development</div>
                <div class="lang-list">
                    <div class="lang-item"><div class="lang-icon"><img src="JavaScript.png" alt="JS"></div> JavaScript</div>
                    <div class="lang-item"><div class="lang-icon"><img src="Scala.png" alt="SC"></div> Scala</div>
                    <div class="lang-item"><div class="lang-icon"><img src="Go.png" alt="GO"></div> Go</div>
                    <div class="lang-item"><div class="lang-icon"><img src="Ruby.png" alt="RB"></div> Ruby</div>
                    <div class="lang-item"><div class="lang-icon"><img src="Phython.png" alt="PY"></div> Python</div>
                </div>
            </div>

            <!-- Mobile -->
            <div class="career-card">
                <div class="career-header">Mobile Development</div>
                <div class="lang-list">
                    <div class="lang-item"><div class="lang-icon"><img src="JavaScript.png" alt="JS"></div> JavaScript</div>
                    <div class="lang-item"><div class="lang-icon"><img src="Java.png" alt="JV"></div> Java</div>
                    <div class="lang-item"><div class="lang-icon"><img src="ObjectiveC.png" alt="OC"></div> Objective C</div>
                    <div class="lang-item"><div class="lang-icon"><img src="Swift.png" alt="SW"></div> Swift</div>
                </div>
            </div>
        </div>

        <h2>Top 10 Programming Language in 2022</h2>
        <iframe src="Pratikum4.html" height="300px" title="Latihan 4"></iframe>

        <h2>List of programming languages from Wikipedia</h2>
        <iframe src="https://en.wikipedia.org/wiki/List_of_programming_languages" height="400px" title="Wikipedia Programming Languages"></iframe>
    </div>

</body>
</html>
